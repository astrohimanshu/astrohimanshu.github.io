        content: "Certified in end-to-end ML model development and deployment on Azure (2025)."
        image: /images/achievement.jpg
      - title: "Poster Presentation – Astronomical Society of India"
        content: "Presented research on galaxy cluster modeling at the XXXIXth ASI Meeting (2021)."
        image: /images/achievement.jpg

  # PROJECTS
  projects:
    enable: true
    title: "Key Projects"
    items:
      - title: "COVID-19 Time Series Forecasting"
        content: "Built an ARIMA-based model for COVID-19 case forecasting and validated predictions against live data with 95% confidence accuracy."
        image: /images/projects/covid.png
        badges:
          - "Python"
          - "ARIMA"
          - "Time Series"
        links:
          - icon: fab fa-github
            url: "https://github.com/astrohimanshu/forecasting-covid-19-with-ARIMA"

      - title: "Hamiltonian Monte Carlo for Cosmological Parameters Estimation"
        content: "Implemented Hamiltonian Monte Carlo from scratch to estimate cosmological parameters using Supernova Ia data; achieved 69% chain acceptance.GR convergence ratio ∼0.96."
        image: /images/projects/hmc.png
        badges:
          - "Python"
          - "MCMC"
          - "Astrophysics"
        links:
          - icon: fab fa-github
            url: "https://github.com/astrohimanshu/Hamiltonian-monte-carlo-for-paramter-estimation"

      - title: "Importance Sampling on Supernova Ia Data"
        content: "Applied importance sampling for Bayesian inference on cosmological datasets, reaching 88% acceptance for parameter estimation."
        image: /images/projects/imp.png
        badges:
          - "Python"
          - "Monte Carlo"
          - "Astrophysics"
        links:
          - icon: fab fa-github
            url: "https://github.com/astrohimanshu/Importance-Sampling-applied-for-cosmological-parameters"

