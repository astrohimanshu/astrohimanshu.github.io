  # ABOUT
  about:
    enable: true
    title: "About Me"
    image: "/images/me33.png"
    content: |-
      I am a **Computational Data Science graduate student** at the **National Institute of Technology, Karnataka**.  
      My work spans **data analysis, image processing, machine learning**, and **Bayesian inference** for scientific and industrial applications.  

      Previously, during my **M.Sc. in Astronomy at IIT Indore**, I carried out research on galaxy clusters using 
      the **Sunyaev–Zel’dovich effect**, involving Python-based simulations, C++ integration, and Monte Carlo inference.
    skills:
      enable: true
      title: "Core Skills"
      items:
        - "Python"
        - "C++"
        - "SQL"
        - "TensorFlow"
        - "PyTorch"
        - "Azure ML & CI/CD"
        - "Data Visualization (Tableau, Power BI)"
        - "Statistical Modeling & Astrostatistics"

  # EXPERIENCE
  experience:
    enable: true
    title: "Research & Academic Experience"
    items:
      - company: "Indian Institute of Technology, Indore"
        companyUrl: "https://www.iiti.ac.in"
        jobs:
          - name: "Master’s Research – Galaxy Cluster Analysis via Sunyaev–Zel’dovich Effect"
            date: "2019 – 2021"
            content: |-
              Conducted research on galaxy clusters through simulation and data analysis:
              - Processed astronomical data using Python and C++ for modeling SZ effect.
              - Performed image processing and Monte Carlo analysis for parameter inference.
              - Compared simulated and observed cluster data for model validation.
            info:
              content: "Tools: Python, C++, NumPy, Matplotlib, MCMC"
      - company: "Central Electronics Limited (CEL), Uttar Pradesh"
        companyUrl: "https://www.celindia.co.in"
        jobs:
          - name: "Undergraduate Industrial Training"
            date: "2017"
            content: |-
              Completed industrial training focused on **piezoelectric devices and quality control processes**:
              - Studied assembly-line manufacturing and quality assurance of piezoelectric elements.
              - Performed testing of piezoelectric constants and capacitance measurements.
              - Gained exposure to applications of piezoelectric systems in **defence and explosives** technology.
            info:
              content: "Domain: Electronics Manufacturing | Materials Characterization"
  


  # ACHIEVEMENTS
  achievements:
    enable: true
    title: "Achievements & Certifications"
